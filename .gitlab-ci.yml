stages:
  - build
  - test
  - docker
  - deploy

variables:
  IMAGE_NAME: "$env:DOCKER_USERNAME/devops-app"

# -------------------
# BUILD
# -------------------
build:
  stage: build

  tags:
    - ci

  script:
    - npm install
    - echo "Build complete"

# -------------------
# TEST
# -------------------
test:
  stage: test

  tags:
    - ci

  script:
    - npm test

# -------------------
# DOCKER BUILD + PUSH
# -------------------
docker-build:
  stage: docker

  tags:
    - ci

  script:
    - docker info
    - echo $env:DOCKER_PASSWORD | docker login -u $env:DOCKER_USERNAME --password-stdin
    - docker build -t "$env:DOCKER_USERNAME/devops-app" .
    - docker push "$env:DOCKER_USERNAME/devops-app"

# -------------------
# DEPLOY
# -------------------
deploy:
  stage: deploy

  tags:
    - ci

  script:
    - docker stop devops-container; if (!$?) { Write-Host "Container not running" }
    - docker rm devops-container; if (!$?) { Write-Host "Container not found" }
    - docker pull "$env:DOCKER_USERNAME/devops-app"
    - docker build --no-cache -t kaustubh33/devops-app .
    - docker run -d -p 8000:3000 --name devops-container "$env:DOCKER_USERNAME/devops-app"